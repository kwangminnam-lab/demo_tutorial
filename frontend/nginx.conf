# DocuX 프론트엔드 nginx — 정적 SPA 서빙 + 백엔드 API 프록시.
# /etc/nginx/templates/default.conf.template 로 마운트되어, 컨테이너 시작 시
# nginx 엔트리포인트가 ${BACKEND_URL}을 환경변수로 치환한다($host 등 nginx 변수는 보존).

server {
    listen 8080;
    server_name _;

    # 업로드 본문 상한 — nginx 기본 1MB면 스캔 이미지/문서가 413으로 막힌다.
    # 백엔드 _MAX_UPLOAD_BYTES(80MiB)와 맞춘다.
    client_max_body_size 80m;

    root /usr/share/nginx/html;
    index index.html;

    # 정적 에셋은 길게 캐시(해시 파일명이라 안전).
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA — 클라이언트 라우팅은 index.html로 폴백.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 프록시 — 상대경로 /v1 호출을 백엔드 서비스로 전달.
    location /v1/ {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # RAG SSE 스트리밍 — 버퍼링 끄고 타임아웃 넉넉히(LLM 응답 대비).
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # 헬스체크 프록시(프론트의 me/health 흐름).
    location = /healthz {
        proxy_pass ${BACKEND_URL};
    }
}
