{{- $img := printf "%s:%s" .Values.image.repository (.Values.image.tag | toString) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docux-frontend
  labels:
    app: docux-frontend
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: docux-frontend
  template:
    metadata:
      labels:
        app: docux-frontend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 101          # nginx-unprivileged
      containers:
        - name: frontend
          image: {{ $img | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - { name: BACKEND_URL, value: {{ .Values.backendUrl | quote }} }
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: docux-frontend
  labels:
    app: docux-frontend
spec:
  type: {{ .Values.service.type }}
  selector:
    app: docux-frontend
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080
