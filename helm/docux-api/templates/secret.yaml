{{- if .Values.secret.create }}
# 차트가 Secret을 직접 생성 — OpenBao·kubectl 불요(ADR-019 토폴로지).
# 실값은 배포 화면 values(secret.data)로만 주입한다. 패키지엔 빈 값.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.existingSecret }}
  labels:
    app: docux-api
type: Opaque
stringData:
  {{- range $k, $v := .Values.secret.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
